<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" fill="none">
  <defs>
    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0" y1="0" x2="600" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="50%" stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <!-- Gold gradient -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DAA520"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <!-- Chip gradient -->
    <linearGradient id="chipGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8d5a3"/>
      <stop offset="50%" stop-color="#c9b87a"/>
      <stop offset="100%" stop-color="#d4c28e"/>
    </linearGradient>
    <!-- Honeycomb pattern -->
    <pattern id="honeycomb" x="0" y="0" width="28" height="32" patternUnits="userSpaceOnUse">
      <path d="M14 0l14 8v16l-14 8L0 24V8z" fill="none" stroke="rgba(218,165,32,0.12)" stroke-width="0.8"/>
    </pattern>
  </defs>

  <!-- Card body -->
  <rect width="600" height="380" rx="18" fill="url(#cardGrad)"/>

  <!-- Honeycomb texture -->
  <rect width="600" height="380" rx="18" fill="url(#honeycomb)"/>

  <!-- Gold circle emblem (top, peeking) -->
  <circle cx="320" cy="-20" r="140" fill="none" stroke="url(#goldGrad)" stroke-width="3" opacity="0.5"/>
  <circle cx="320" cy="-20" r="136" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.3"/>

  <!-- Rewards Visa Elite text -->
  <text x="400" y="42" fill="#DAA520" font-size="16" font-family="Georgia, serif" font-style="italic" letter-spacing="1">Rewards Visa Elite</text>

  <!-- EMV Chip -->
  <rect x="55" y="100" width="55" height="42" rx="6" fill="url(#chipGrad)" stroke="#b8a060" stroke-width="1"/>
  <line x1="55" y1="114" x2="110" y2="114" stroke="#a89050" stroke-width="0.8"/>
  <line x1="55" y1="128" x2="110" y2="128" stroke="#a89050" stroke-width="0.8"/>
  <line x1="82" y1="100" x2="82" y2="142" stroke="#a89050" stroke-width="0.8"/>

  <!-- HIVEAIR Logo circle -->
  <circle cx="200" cy="120" r="42" fill="rgba(13,31,60,0.9)" stroke="#DAA520" stroke-width="2"/>
  <!-- Bee body -->
  <g transform="translate(200,118) rotate(-15)">
    <ellipse cx="0" cy="0" rx="18" ry="8" fill="#DAA520"/>
    <rect x="-5" y="-8" width="4" height="16" fill="#1a1a1a" rx="1"/>
    <rect x="3" y="-8" width="4" height="16" fill="#1a1a1a" rx="1"/>
    <ellipse cx="18" cy="0" rx="6" ry="5" fill="#DAA520"/>
    <path d="M-18 0 L-24 -7 L-22 0 L-24 7 Z" fill="#fff" opacity="0.7"/>
    <ellipse cx="2" cy="-11" rx="10" ry="4" fill="#fff" opacity="0.6" transform="rotate(-10 2 -11)"/>
    <ellipse cx="-2" cy="11" rx="8" ry="3" fill="#fff" opacity="0.5" transform="rotate(10 -2 11)"/>
    <circle cx="21" cy="-2" r="1.5" fill="#1a1a1a"/>
  </g>
  <!-- HIVEAIR text under logo -->
  <text x="200" y="175" text-anchor="middle" fill="#DAA520" font-size="11" font-weight="bold" font-family="sans-serif" letter-spacing="3">HIVEAIR</text>

  <!-- Card number -->
  <text x="55" y="230" fill="#DAA520" font-size="30" font-weight="bold" font-family="'Courier New', monospace" letter-spacing="4">4128  7345  6189  0210</text>

  <!-- Valid Thru -->
  <text x="55" y="275" fill="rgba(218,165,32,0.6)" font-size="8" font-family="sans-serif" letter-spacing="1">VALID THRU</text>
  <text x="55" y="295" fill="#DAA520" font-size="16" font-weight="bold" font-family="sans-serif">12/28</text>

  <!-- Member Since -->
  <text x="200" y="275" fill="rgba(218,165,32,0.6)" font-size="8" font-family="sans-serif" letter-spacing="1">MEMBER SINCE</text>
  <text x="200" y="295" fill="#DAA520" font-size="16" font-weight="bold" font-family="sans-serif">2024</text>

  <!-- Cardholder name -->
  <text x="55" y="340" fill="#DAA520" font-size="18" font-weight="bold" font-family="sans-serif" letter-spacing="2">ALEX R. JOHNSON</text>

  <!-- VISA branding -->
  <text x="490" y="335" fill="#fff" font-size="32" font-weight="bold" font-family="sans-serif" font-style="italic">VISA</text>
  <text x="505" y="355" fill="rgba(255,255,255,0.7)" font-size="13" font-family="sans-serif" font-style="italic">Infinite</text>
</svg>
