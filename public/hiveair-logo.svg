<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Circle background -->
  <circle cx="32" cy="32" r="30" fill="#003366" stroke="#DAA520" stroke-width="2.5"/>
  <!-- Honeycomb pattern (subtle) -->
  <g opacity="0.15" stroke="#DAA520" stroke-width="0.5" fill="none">
    <path d="M16 18l4-2.3 4 2.3v4.6l-4 2.3-4-2.3z"/>
    <path d="M24 18l4-2.3 4 2.3v4.6l-4 2.3-4-2.3z"/>
    <path d="M32 18l4-2.3 4 2.3v4.6l-4 2.3-4-2.3z"/>
    <path d="M40 18l4-2.3 4 2.3v4.6l-4 2.3-4-2.3z"/>
    <path d="M12 25l4-2.3 4 2.3v4.6l-4 2.3-4-2.3z"/>
    <path d="M20 25l4-2.3 4 2.3v4.6l-4 2.3-4-2.3z"/>
    <path d="M28 25l4-2.3 4 2.3v4.6l-4 2.3-4-2.3z"/>
    <path d="M36 25l4-2.3 4 2.3v4.6l-4 2.3-4-2.3z"/>
    <path d="M44 25l4-2.3 4 2.3v4.6l-4 2.3-4-2.3z"/>
  </g>
  <!-- Bee-airplane body -->
  <g transform="translate(32,34) rotate(-25)">
    <!-- Fuselage / bee body -->
    <ellipse cx="0" cy="0" rx="14" ry="6" fill="#DAA520"/>
    <!-- Stripes -->
    <rect x="-4" y="-6" width="3.5" height="12" fill="#1a1a1a" rx="1"/>
    <rect x="2" y="-6" width="3.5" height="12" fill="#1a1a1a" rx="1"/>
    <!-- Nose cone -->
    <ellipse cx="14" cy="0" rx="4" ry="3.5" fill="#DAA520"/>
    <!-- Tail -->
    <path d="M-14 0 L-20 -6 L-18 0 L-20 6 Z" fill="#fff" opacity="0.9"/>
    <!-- Wings -->
    <ellipse cx="2" cy="-9" rx="8" ry="3.5" fill="#fff" opacity="0.85" transform="rotate(-15 2 -9)"/>
    <ellipse cx="-2" cy="9" rx="7" ry="3" fill="#fff" opacity="0.7" transform="rotate(15 -2 9)"/>
    <!-- Eye -->
    <circle cx="16" cy="-1" r="1.2" fill="#1a1a1a"/>
    <!-- Antennae -->
    <path d="M16 -3 Q18 -8 21 -9" stroke="#1a1a1a" stroke-width="1" fill="none" stroke-linecap="round"/>
    <circle cx="21" cy="-9" r="1" fill="#DAA520"/>
    <path d="M15 -3.5 Q15 -9 13 -11" stroke="#1a1a1a" stroke-width="1" fill="none" stroke-linecap="round"/>
    <circle cx="13" cy="-11" r="1" fill="#DAA520"/>
  </g>
</svg>
