<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 500" fill="none">
  <!-- Phone frame -->
  <rect x="0" y="0" width="280" height="500" rx="32" fill="#0a1628"/>
  <rect x="4" y="4" width="272" height="492" rx="28" fill="#0d2240"/>

  <!-- Status bar -->
  <text x="20" y="28" fill="rgba(255,255,255,0.7)" font-size="10" font-family="sans-serif">10:10 AM</text>
  <rect x="220" y="18" width="18" height="9" rx="2" fill="rgba(255,255,255,0.7)"/>
  <rect x="221" y="19" width="12" height="7" rx="1" fill="#52c41a"/>

  <!-- Honeycomb pattern (subtle) -->
  <g opacity="0.08" stroke="#DAA520" stroke-width="0.5" fill="none">
    <path d="M40 60l12-7 12 7v14l-12 7-12-7z"/>
    <path d="M64 60l12-7 12 7v14l-12 7-12-7z"/>
    <path d="M88 60l12-7 12 7v14l-12 7-12-7z"/>
    <path d="M112 60l12-7 12 7v14l-12 7-12-7z"/>
    <path d="M136 60l12-7 12 7v14l-12 7-12-7z"/>
    <path d="M160 60l12-7 12 7v14l-12 7-12-7z"/>
    <path d="M184 60l12-7 12 7v14l-12 7-12-7z"/>
    <path d="M208 60l12-7 12 7v14l-12 7-12-7z"/>
    <path d="M52 80l12-7 12 7v14l-12 7-12-7z"/>
    <path d="M76 80l12-7 12 7v14l-12 7-12-7z"/>
    <path d="M100 80l12-7 12 7v14l-12 7-12-7z"/>
    <path d="M124 80l12-7 12 7v14l-12 7-12-7z"/>
    <path d="M148 80l12-7 12 7v14l-12 7-12-7z"/>
    <path d="M172 80l12-7 12 7v14l-12 7-12-7z"/>
    <path d="M196 80l12-7 12 7v14l-12 7-12-7z"/>
  </g>

  <!-- Logo circle -->
  <circle cx="140" cy="120" r="55" fill="#0d2240" stroke="#DAA520" stroke-width="2"/>
  <!-- Bee body in logo -->
  <g transform="translate(140,118) rotate(-20)">
    <ellipse cx="0" cy="0" rx="22" ry="10" fill="#DAA520"/>
    <rect x="-6" y="-10" width="5" height="20" fill="#1a1a1a" rx="1"/>
    <rect x="3" y="-10" width="5" height="20" fill="#1a1a1a" rx="1"/>
    <ellipse cx="22" cy="0" rx="7" ry="6" fill="#DAA520"/>
    <path d="M-22 0 L-30 -9 L-27 0 L-30 9 Z" fill="#fff" opacity="0.8"/>
    <ellipse cx="3" cy="-14" rx="12" ry="5" fill="#fff" opacity="0.7" transform="rotate(-12 3 -14)"/>
    <ellipse cx="-3" cy="14" rx="10" ry="4" fill="#fff" opacity="0.6" transform="rotate(12 -3 14)"/>
    <circle cx="25" cy="-2" r="2" fill="#1a1a1a"/>
  </g>

  <!-- HIVEAIR text -->
  <text x="140" y="195" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold" font-family="sans-serif" letter-spacing="3">HIVEAIR</text>

  <!-- Welcome text -->
  <text x="140" y="225" text-anchor="middle" fill="#DAA520" font-size="13" font-weight="bold" font-family="sans-serif" letter-spacing="1">WELCOME TO HIVEAIR</text>
  <text x="140" y="245" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10" font-weight="bold" font-family="sans-serif" letter-spacing="2">FLY SWEETER. REACH FURTHER.</text>

  <!-- Action buttons grid -->
  <!-- Book Flight -->
  <rect x="24" y="270" width="112" height="80" rx="10" fill="rgba(255,255,255,0.08)" stroke="#DAA520" stroke-width="1"/>
  <text x="80" y="325" text-anchor="middle" fill="#DAA520" font-size="10" font-weight="bold" font-family="sans-serif">BOOK FLIGHT</text>
  <circle cx="80" cy="300" r="12" fill="none" stroke="#DAA520" stroke-width="1"/>
  <text x="80" y="304" text-anchor="middle" fill="#DAA520" font-size="14">&#9992;</text>

  <!-- Check-In -->
  <rect x="144" y="270" width="112" height="80" rx="10" fill="rgba(255,255,255,0.08)" stroke="#DAA520" stroke-width="1"/>
  <text x="200" y="325" text-anchor="middle" fill="#DAA520" font-size="10" font-weight="bold" font-family="sans-serif">CHECK-IN</text>
  <circle cx="200" cy="300" r="12" fill="none" stroke="#DAA520" stroke-width="1"/>
  <text x="200" y="304" text-anchor="middle" fill="#DAA520" font-size="14">&#10003;</text>

  <!-- My Trips -->
  <rect x="24" y="360" width="112" height="80" rx="10" fill="rgba(255,255,255,0.08)" stroke="#DAA520" stroke-width="1"/>
  <text x="80" y="415" text-anchor="middle" fill="#DAA520" font-size="10" font-weight="bold" font-family="sans-serif">MY TRIPS</text>
  <circle cx="80" cy="390" r="12" fill="none" stroke="#DAA520" stroke-width="1"/>
  <text x="80" y="394" text-anchor="middle" fill="#DAA520" font-size="14">&#9993;</text>

  <!-- Flight Status -->
  <rect x="144" y="360" width="112" height="80" rx="10" fill="rgba(255,255,255,0.08)" stroke="#DAA520" stroke-width="1"/>
  <text x="200" y="415" text-anchor="middle" fill="#DAA520" font-size="10" font-weight="bold" font-family="sans-serif">FLIGHT STATUS</text>
  <circle cx="200" cy="390" r="12" fill="none" stroke="#DAA520" stroke-width="1"/>
  <text x="200" y="394" text-anchor="middle" fill="#DAA520" font-size="12">&#128337;</text>

  <!-- Bottom nav bar -->
  <rect x="4" y="454" width="272" height="42" rx="0 0 28 28" fill="rgba(255,255,255,0.95)"/>
  <text x="46" y="480" text-anchor="middle" fill="#333" font-size="8" font-family="sans-serif">Home</text>
  <text x="102" y="480" text-anchor="middle" fill="#333" font-size="8" font-family="sans-serif">Search</text>
  <text x="158" y="480" text-anchor="middle" fill="#333" font-size="8" font-family="sans-serif">My Trips</text>
  <text x="214" y="480" text-anchor="middle" fill="#333" font-size="8" font-family="sans-serif">Profile</text>
</svg>
